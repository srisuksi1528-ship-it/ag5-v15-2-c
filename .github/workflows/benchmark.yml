name: AG5 Benchmark
on: [push, pull_request]
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python backtest_ag5.py
      - run: cat RESULTS_AG5.md